<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse Even Number</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <h1>Reverse Even Number</h1>

                <form id="form">

                    <label>Start Number :-</label>
                    <input type="number" placeholder="enter number" id="start" />

                    <br>

                    <label>End Number :-</label>
                    <input type="number" placeholder="enter number" id="end" />

                    <br>

                    <button type="submit">Submit</button>

                </form>

                <h2 id="result"></h2>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
