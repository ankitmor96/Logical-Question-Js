<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Number </title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <h1> Fined Largest Number </h1>

                <form id="form">

                    <label>Number - 1 :-</label>
                    <input type="number" placeholder="enter number" id="num1" required />

                    <br>

                    <label>Number - 2 :-</label>
                    <input type="number" placeholder="enter number" id="num2" required />

                    <br>

                     <label>Number - 3 :-</label>
                    <input type="number" placeholder="enter number" id="num3" required />

                    <br>

                     <label>Number - 4 :-</label>
                    <input type="number" placeholder="enter number" id="num4" required />

                    <br>

                     <label>Number - 5 :-</label>
                    <input type="number" placeholder="enter number" id="num5" required />

                    <br>

                    <button type="submit"> Submit </button>

                </form>


                <h2 id="result"></h2>

            </div>
        </div>
    </div>
    
    <script src="./index.js"></script>
</body>

</html>
